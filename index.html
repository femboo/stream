<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>gmiki</title>
<meta name="description" content="gmiki . Твич, Телеграм, донат.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%23dddddb%22/><text x=%2250%22 y=%2266%22 font-size=%2258%22 text-anchor=%22middle%22 fill=%22%23222%22>g</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#111110;
    --card:rgba(255,255,255,0.14);
    --card-border:rgba(255,255,255,0.35);
    --tile:rgba(255,255,255,0.14);
    --tile-hover:rgba(255,255,255,0.24);
    --tile-border:rgba(255,255,255,0.22);
    --text:#f5f5f3;
    --muted:rgba(245,245,243,0.72);
    --line:rgba(255,255,255,0.24);
    --radius-card:28px;
    --radius-tile:16px;
    --radius-avatar:22px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html, body{height:100%;}

  body{
    color:var(--text);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
    background:var(--bg);
  }

  .bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    filter:saturate(1.05) brightness(0.85);
  }

  .bg-dim{
    position:fixed;
    inset:0;
    z-index:1;
    background:rgba(10,10,10,0.28);
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:400px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius-card);
    padding:40px 30px 32px;
    text-align:center;
    backdrop-filter:blur(22px) saturate(1.3);
    -webkit-backdrop-filter:blur(22px) saturate(1.3);
    box-shadow:0 8px 40px rgba(0,0,0,0.35);
  }

  .avatar-frame{
    position:relative;
    width:92px;
    height:92px;
    margin:0 auto 18px;
  }

  .avatar{
    width:100%;
    height:100%;
    border-radius:var(--radius-avatar);
    overflow:hidden;
    background:rgba(255,255,255,0.15);
    border:1px solid var(--line);
    cursor:pointer;
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .nightcap{
    position:absolute;
    top:-16px;
    left:-10px;
    width:34px;
    height:34px;
    transform:rotate(-18deg);
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
  }
  .avatar-frame.is-sleeping .nightcap{opacity:0.92;}

  .zzz{
    position:absolute;
    top:-4px;
    right:-14px;
    width:30px;
    height:50px;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .avatar-frame.is-sleeping .zzz{opacity:1;}
  .zzz span{
    position:absolute;
    right:0;
    font-weight:700;
    font-family:'Inter', sans-serif;
    color:var(--text);
    opacity:0;
    animation:zzzFloat 3.2s ease-in-out infinite;
  }
  .zzz span:nth-child(1){font-size:13px;right:6px;bottom:6px;animation-delay:0s;}
  .zzz span:nth-child(2){font-size:10px;right:0px;bottom:14px;animation-delay:0.8s;}
  .zzz span:nth-child(3){font-size:15px;right:10px;bottom:2px;animation-delay:1.6s;}
  .zzz span:nth-child(4){font-size:9px;right:-2px;bottom:18px;animation-delay:2.4s;}
  @keyframes zzzFloat{
    0%{opacity:0;transform:translateY(4px) scale(0.75);}
    18%{opacity:1;}
    75%{opacity:0.75;}
    100%{opacity:0;transform:translateY(-30px) scale(1.2);}
  }

  .zburst-letter{
    position:absolute;
    top:50%;
    left:50%;
    font-weight:800;
    font-family:'Inter', sans-serif;
    color:var(--text);
    pointer-events:none;
    animation:zBurst 900ms ease-out forwards;
    z-index:5;
  }
  @keyframes zBurst{
    0%{transform:translate(-50%,-50%) translate(0,0) scale(0.6) rotate(0deg);opacity:1;}
    100%{transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(1.4) rotate(var(--tr));opacity:0;}
  }

  body{transition:transform 0.6s ease;}
  body.site-flipped{transform:rotate(180deg);}
  body.site-mirrored{transform:scaleX(-1);}
  body.site-flipped.site-mirrored{transform:rotate(180deg) scaleX(-1);}

  html.color-inverted{filter:invert(1) hue-rotate(180deg);}

  h1{
    font-size:21px;
    font-weight:700;
    letter-spacing:-0.01em;
  }

  .desc{
    margin-top:8px;
    font-size:14px;
    line-height:1.5;
    color:var(--muted);
    max-width:280px;
    margin-left:auto;
    margin-right:auto;
  }

  .links{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .section{
    margin-top:26px;
    text-align:left;
  }
  .section-label{
    font-size:11px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
    padding-left:2px;
  }
  .section .links{margin-top:0;}

  .tile.tile-empty{
    opacity:0.55;
    cursor:default;
  }
  .tile.tile-empty:hover{background:var(--tile);}
  .tile-empty .tile-url{font-style:italic;}

  .tile{
    display:flex;
    align-items:center;
    gap:14px;
    padding:13px 16px;
    background:var(--tile);
    border:1px solid var(--tile-border);
    border-radius:var(--radius-tile);
    text-decoration:none;
    color:var(--text);
    transition:background 0.15s ease, transform 0.1s ease;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .tile:hover, .tile:focus-visible{
    background:var(--tile-hover);
    outline:none;
  }
  .tile:active{transform:scale(0.98);}

  .tile-icon{
    flex:0 0 auto;
    width:34px;
    height:34px;
    border-radius:10px;
    background:rgba(255,255,255,0.22);
    border:1px solid var(--tile-border);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
  }
  .tile-icon svg{width:18px;height:18px;display:block;}

  .tile-body{
    flex:1;
    min-width:0;
    text-align:left;
  }
  .tile-label{
    font-size:14px;
    font-weight:600;
  }
  .tile-url{
    font-size:12px;
    color:var(--muted);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .tile-arrow{
    flex:0 0 auto;
    color:var(--muted);
    font-size:15px;
  }

  footer{
    margin-top:26px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.03em;
  }

  @media (max-width:380px){
    .card{padding:32px 22px 26px;}
    .avatar-frame{width:80px;height:80px;}
  }

  :focus-visible{outline:2px solid #ffffff;outline-offset:2px;}
</style>
</head>

<script>
  // ==== ССЫЛКИ — редактируй только здесь ====
  // Если поле оставить пустым '', плитка будет неактивной (placeholder) на сайте.
  const LINKS = {
    twitch:   { url: "https://www.twitch.tv/gmiki_twich", display: "twitch.tv/gmiki_twich" },
    telegram: { url: "https://t.me/gmiki_online",          display: "t.me/gmiki_online" },
    donate:   { url: "https://donatty.com/gmikitwich",     display: "donatty.com/gmikitwich" },
    youtube:  { url: "",                                    display: "youtube.com/@..." },
    tiktok:   { url: "",                                    display: "tiktok.com/@..." },
    minecraft:{ url: "",                                    display: "плейлист / клип" },
    dota:     { url: "",                                    display: "плейлист / клип" }
  };

  document.querySelectorAll('.tile[data-key]').forEach(tile => {
    const key = tile.getAttribute('data-key');
    const data = LINKS[key];
    const urlEl = tile.querySelector('[data-url]');
    if(!data) return;
    if(data.url){
      tile.href = data.url;
      if(urlEl) urlEl.textContent = data.display || data.url;
    } else {
      tile.removeAttribute('href');
      tile.classList.add('tile-empty');
      tile.setAttribute('aria-disabled','true');
      if(urlEl) urlEl.textContent = data.display || 'скоро';
      tile.addEventListener('click', e => e.preventDefault());
    }
  });
</script>

<script>
(function(){
  const body = document.body;
  const html = document.documentElement;
  const avatarFrame = document.getElementById('avatarFrame');

  // ---- state ----
  let flipped = false;
  let mirrored = false;

  function applyTransform(){
    let t = '';
    if(flipped) t += 'rotate(180deg) ';
    if(mirrored) t += 'scaleX(-1) ';
    body.style.transform = t.trim() || 'none';
  }

  // avatar double-click -> flip whole page upside down, double-click again to restore
  avatarFrame.addEventListener('dblclick', (e)=>{
    e.preventDefault();
    flipped = !flipped;
    applyTransform();
  });

  // ---- idle sleep state ----
  let lastActivity = Date.now();
  let sleeping = false;
  const IDLE_MS = 25000;

  function markActivity(){ lastActivity = Date.now(); }
  ['mousemove','mousedown','touchstart','scroll'].forEach(evt=>{
    window.addEventListener(evt, markActivity, {passive:true});
  });

  setInterval(()=>{
    if(!sleeping && Date.now() - lastActivity > IDLE_MS){
      sleeping = true;
      avatarFrame.classList.add('is-sleeping');
    }
  }, 1000);

  function wakeUp(){
    if(!sleeping) return;
    sleeping = false;
    avatarFrame.classList.remove('is-sleeping');
    spawnZBurst();
    lastActivity = Date.now();
  }

  function spawnZBurst(){
    const letters = ['Z','z','Z','zz','Z'];
    letters.forEach((ch, i)=>{
      const el = document.createElement('span');
      el.className = 'zburst-letter';
      el.textContent = ch;
      el.style.fontSize = (12 + Math.random()*10) + 'px';
      const angle = (Math.PI * 2 * i / letters.length) + (Math.random()*0.6-0.3);
      const dist = 46 + Math.random()*26;
      el.style.setProperty('--tx', (Math.cos(angle)*dist).toFixed(1) + 'px');
      el.style.setProperty('--ty', (Math.sin(angle)*dist - 18).toFixed(1) + 'px');
      el.style.setProperty('--tr', (Math.random()*60-30).toFixed(0) + 'deg');
      avatarFrame.appendChild(el);
      setTimeout(()=>el.remove(), 950);
    });
  }

  // clicking any tile while sleeping -> Z's fly out
  document.querySelectorAll('.tile').forEach(tile=>{
    tile.addEventListener('click', ()=>{
      if(sleeping) wakeUp();
    });
  });

  // ---- key sequence detection: digit combo for invert, double space/enter for mirror ----
  const invertSeq = ['1','2','3','4','5','6','7','8','9','1','0'];
  const revertSeq = [...invertSeq].reverse();
  let digitBuffer = [];

  let lastKey = null;
  let lastKeyTime = 0;
  const DOUBLE_MS = 700;

  window.addEventListener('keydown', (e)=>{
    markActivity();
    const key = e.key;

    // digit sequence tracking
    if(/^[0-9]$/.test(key)){
      digitBuffer.push(key);
      if(digitBuffer.length > invertSeq.length) digitBuffer.shift();
      if(digitBuffer.join(',') === invertSeq.join(',')){
        html.classList.add('color-inverted');
        digitBuffer = [];
      } else if(digitBuffer.join(',') === revertSeq.join(',')){
        html.classList.remove('color-inverted');
        digitBuffer = [];
      }
    }

    // double space / double enter -> mirror toggle
    if(key === ' ' || key === 'Enter'){
      const now = Date.now();
      if(lastKey === key && (now - lastKeyTime) < DOUBLE_MS){
        mirrored = !mirrored;
        applyTransform();
        lastKey = null;
        lastKeyTime = 0;
      } else {
        lastKey = key;
        lastKeyTime = now;
      }
    } else {
      lastKey = null;
    }
  });
})();
</script>
