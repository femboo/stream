<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>gmiki</title>
<meta name="description" content="gmiki — стример. Твич, Телеграм, донат.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%23dddddb%22/><text x=%2250%22 y=%2266%22 font-size=%2258%22 text-anchor=%22middle%22 fill=%22%23222%22>g</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#111110;
    --card:rgba(255,255,255,0.14);
    --card-border:rgba(255,255,255,0.35);
    --tile:rgba(255,255,255,0.14);
    --tile-hover:rgba(255,255,255,0.24);
    --tile-border:rgba(255,255,255,0.22);
    --text:#f5f5f3;
    --muted:rgba(245,245,243,0.72);
    --line:rgba(255,255,255,0.24);
    --radius-card:28px;
    --radius-tile:16px;
    --radius-avatar:22px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html, body{height:100%;}

  body{
    color:var(--text);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
    background:var(--bg);
  }

  .bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    filter:saturate(1.05) brightness(0.85);
  }

  .bg-dim{
    position:fixed;
    inset:0;
    z-index:1;
    background:rgba(10,10,10,0.28);
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:400px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius-card);
    padding:40px 30px 32px;
    text-align:center;
    backdrop-filter:blur(22px) saturate(1.3);
    -webkit-backdrop-filter:blur(22px) saturate(1.3);
    box-shadow:0 8px 40px rgba(0,0,0,0.35);
  }

  .avatar{
    width:92px;
    height:92px;
    border-radius:var(--radius-avatar);
    overflow:hidden;
    margin:0 auto 18px;
    background:rgba(255,255,255,0.15);
    border:1px solid var(--line);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  h1{
    font-size:21px;
    font-weight:700;
    letter-spacing:-0.01em;
  }

  .desc{
    margin-top:8px;
    font-size:14px;
    line-height:1.5;
    color:var(--muted);
    max-width:280px;
    margin-left:auto;
    margin-right:auto;
  }

  .links{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .tile{
    display:flex;
    align-items:center;
    gap:14px;
    padding:13px 16px;
    background:var(--tile);
    border:1px solid var(--tile-border);
    border-radius:var(--radius-tile);
    text-decoration:none;
    color:var(--text);
    transition:background 0.15s ease, transform 0.1s ease;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .tile:hover, .tile:focus-visible{
    background:var(--tile-hover);
    outline:none;
  }
  .tile:active{transform:scale(0.98);}

  .tile-icon{
    flex:0 0 auto;
    width:34px;
    height:34px;
    border-radius:10px;
    background:rgba(255,255,255,0.22);
    border:1px solid var(--tile-border);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
  }
  .tile-icon svg{width:18px;height:18px;display:block;}

  .tile-body{
    flex:1;
    min-width:0;
    text-align:left;
  }
  .tile-label{
    font-size:14px;
    font-weight:600;
  }
  .tile-url{
    font-size:12px;
    color:var(--muted);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .tile-arrow{
    flex:0 0 auto;
    color:var(--muted);
    font-size:15px;
  }

  footer{
    margin-top:26px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.03em;
  }

  @media (max-width:380px){
    .card{padding:32px 22px 26px;}
    .avatar{width:80px;height:80px;}
  }

  :focus-visible{outline:2px solid #ffffff;outline-offset:2px;}
</style>
</head>
<body>

<img class="bg-video" src="gmikiGIF.gif" alt="" aria-hidden="true">
<div class="bg-dim"></div>

<div class="card">
  <div class="avatar">
    <img src="gmiki.webp" alt="gmiki">
  </div>

  <h1>gmiki</h1>
  <p class="desc">стримы, геймплей и живое общение с чатом — заходи на трансляции и оставайся на связи</p>

  <div class="links">
    <a class="tile" href="https://www.twitch.tv/gmiki_twich" target="_blank" rel="noopener noreferrer">
      <span class="tile-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 3L4 7V19H8V22L11 19H15L20 14V3H5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M13 8V13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M17 8V13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tile-body">
        <span class="tile-label">Twitch</span>
        <span class="tile-url">twitch.tv/gmiki_twich</span>
      </span>
      <span class="tile-arrow" aria-hidden="true">→</span>
    </a>

    <a class="tile" href="https://t.me/gmiki_online" target="_blank" rel="noopener noreferrer">
      <span class="tile-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 4L2.5 11.2C2 11.4 2 12.1 2.5 12.3L7.5 14L9.5 20C9.7 20.5 10.3 20.5 10.6 20.1L13 17L17.7 20.4C18.1 20.7 18.7 20.5 18.8 20L22 4.7C22.1 4.2 21.5 3.8 21 4Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M7.5 14L17 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tile-body">
        <span class="tile-label">Телеграм</span>
        <span class="tile-url">t.me/gmiki_online</span>
      </span>
      <span class="tile-arrow" aria-hidden="true">→</span>
    </a>

    <a class="tile" href="https://donatty.com/gmikitwich" target="_blank" rel="noopener noreferrer">
      <span class="tile-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21C12 21 3.5 15.6 3.5 9.6C3.5 6.6 5.8 4.5 8.5 4.5C10 4.5 11.3 5.2 12 6.3C12.7 5.2 14 4.5 15.5 4.5C18.2 4.5 20.5 6.6 20.5 9.6C20.5 15.6 12 21 12 21Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="tile-body">
        <span class="tile-label">Донат</span>
        <span class="tile-url">donatty.com/gmikitwich</span>
      </span>
      <span class="tile-arrow" aria-hidden="true">→</span>
    </a>
  </div>

  <footer>© gmiki</footer>
</div>

</body>
</html>
